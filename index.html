<html lang="el"><head>
    <style>
        body { transition: opacity ease-in 0.2s; } 
        body[unresolved] { opacity: 0; display: block; overflow: hidden; position: relative; } 
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>𝕸𝖚𝖘ἱ𝖈💕𝕮𝖍𝖔ἱ𝖈𝖊𝖘</title>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; -webkit-user-select:none; user-select:none; }
        
        body { 
            display:flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items:center; 
            gap: 0px;
            height: 100vh;      
            width: 100vw;       
            overflow: hidden;   
            padding-top: 65px;           
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            width: 100%;
            max-width: 800px;
            gap: 2px;
        }

        .web-player {
            display: flex;
            align-items: center;
            gap: 0px;
            background: rgba(0, 255, 255, 0.4);  
            padding: 1px 10px;
            border-radius: 50px;
            border: 2px solid #b8860b;
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
            z-index: 100;
        }

        .web-player:hover {
            background: rgba(184, 134, 11, 0.2); 
            border-color: #ff0000;              
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); 
            transition: all 0.4s ease-in-out;    
        }

        .play-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: #ff0000;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff0000;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-btn:hover { transform: scale(1.05); }

        .vol-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b8860b;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 90px;
            height: 6px;
            background: #444;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 5px #ff0000;
        }
        
        .container { 
            opacity: 0; 
            pointer-events: none; 
            width:100%; 
            height:450px; 
            position:relative; 
            overflow:hidden; 
            border-radius:28px; 
            box-shadow: 0 0 40px rgba(184, 134, 11, .5); 
            transition: opacity 0.8s ease-in-out; 
        }    
        #sparkleCanvas { position:absolute; inset:0; border-radius:28px; pointer-events:none; z-index:10; }
        .container:before { content:""; position:absolute; inset:0; border:3px solid transparent; border-radius:28px; background:linear-gradient(90deg,#b8860b,#ff0000,#b8860b) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; z-index:11; }
        
        .top-title {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            z-index: 15;
            display: inline-block;
            transform-origin: center;
            animation: color-cycle 5s infinite, stretch-pulse 3s infinite ease-in-out;
        }

        .marquee-container {
            position: absolute;
            top: 75px;
            left: 15px;
            right: 15px;
            overflow: hidden;
            white-space: nowrap;
            z-index: 15;
        }
        .marquee-german {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            animation: scroll-bounce 14s ease-in-out infinite alternate, color-cycle 5s infinite;
        }

        @keyframes color-cycle { 0% {color: #b8860b;} 33% {color: #ff0000;} 66% {color: #00ffff;} 100% {color: #b8860b;} }
        @keyframes stretch-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes scroll-bounce { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .eq { position:absolute; bottom:30px; left:40px; height:50px; display:flex; gap:4px; z-index: 12; }
        .eq span { width:8px; animation:eq 1s infinite ease-in-out, eq-colors 3s infinite linear; }
        .eq span:nth-child(2) { animation-delay:.1s }
        .eq span:nth-child(3) { animation-delay:.2s }
        .eq span:nth-child(4) { animation-delay:.3s }
        .eq span:nth-child(5) { animation-delay:.4s }
        .eq span:nth-child(6) { animation-delay:.5s }
        @keyframes eq { 0%,100% {height:10px} 50% {height:45px} }
        @keyframes eq-colors { 0% {background: #ff0000;} 25% {background: #b8860b;} 50% {background: #8b4513;} 75% {background: #ff8c00;} 100% {background: #ff0000;} }

        .datetime { position:absolute; bottom:20px; right:20px; text-align:right; font-weight:bold; font-size:16px; z-index: 20; animation: color-cycle 5s infinite; }

        .dj-container { position: absolute; right: 40px; top: 145px; width: 180px; height: 180px; border-radius: 50%; border: 4px solid #b8860b; background-size: cover; background-position: center; box-shadow: 0 0 20px #b8860b; animation: rotateCircle 10s linear infinite; z-index: 12; }
        @keyframes rotateCircle { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
    </style>
